# AI Inference Node Configuration
# Compatible with Jetson Orin Nano Super

inference_node:
  ros__parameters:
    # Model configuration
    model_path: "/opt/models/hybrid_fp16.trt"  # TensorRT engine path
    model_type: "tensorrt"                     # "tensorrt", "onnx", "pytorch"
    precision: "fp16"                          # "fp32", "fp16", "int8"
    input_width: 640
    input_height: 640

    # Inference parameters
    conf_threshold: 0.25
    iou_threshold: 0.45
    max_detections: 100
    classes: ["crack", "corrosion", "paint_damage"]

    # ROS2 topics
    input_image_topic: "/pegasus0/inspection_camera/color/image_raw"
    output_detections_topic: "/pegasus/ai/defect_detections"
    output_defect_array_topic: "/pegasus/ai/defect_array"
    output_json_topic: "/pegasus/ai/defect_json"
    output_health_topic: "/pegasus/ai/node_health"

    # Processing
    use_cuda_graph: true
    batch_size: 1
    warmup_iterations: 10

    # Publishing rate limit (Hz, 0 = no limit)
    max_publish_rate: 30.0

    # Frame filtering
    skip_frames: 0  # Process every Nth frame (0 = all)

    # Zone mapping (optional)
    enable_zone_mapping: false
    zone_config_path: ""

    # Debug
    publish_annotated_image: false
    annotated_image_topic: "/ai/annotated_image"
    log_level: "INFO"
