name: aerial-ws-sim

x-ros-env: &ros-env
  ROS_DOMAIN_ID: "${ROS_DOMAIN_ID:-22}"
  ROS_DISTRO: humble
  RMW_IMPLEMENTATION: rmw_fastrtps_cpp
  PYTHONUNBUFFERED: "1"

services:
  isaac-sim-60:
    image: nvcr.io/nvidia/isaac-sim:${ISAAC_SIM_VERSION:-6.0.0}
    container_name: aerial-isaac-sim-60
    network_mode: host
    ipc: host
    gpus: all
    shm_size: "2gb"
    environment:
      <<: *ros-env
      ACCEPT_EULA: "Y"
      OMNI_KIT_ALLOW_ROOT: "1"
      NVIDIA_VISIBLE_DEVICES: all
      NVIDIA_DRIVER_CAPABILITIES: all
      DISPLAY: "${DISPLAY:-:0}"
      HEADLESS: "${HEADLESS:-1}"
      FOXGLOVE_PORT: "${FOXGLOVE_PORT:-8865}"
      AERIAL_WS: /workspace/aerial_ws
      PEGASUS_EXT_PATH: "${PEGASUS_EXT_PATH:-}"
      ISAAC_SIM_EXEC: "${ISAAC_SIM_EXEC:-}"
      LD_LIBRARY_PATH: "/isaac-sim/exts/isaacsim.ros2.core/humble/lib:${LD_LIBRARY_PATH:-}"
      PYTHONPATH: "/isaac-sim/exts/isaacsim.ros2.core/humble/rclpy:${PYTHONPATH:-}"
    volumes:
      - .:/workspace/aerial_ws:rw
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - isaac_sim_cache:/root/.cache/ov
      - isaac_sim_data:/root/.local/share/ov/data
      - isaac_sim_logs:/root/.nvidia-omniverse/logs
    working_dir: /workspace/aerial_ws
    entrypoint: ["/bin/bash", "-lc"]
    command: /workspace/aerial_ws/scripts/run_isaac_sim_container.sh
    restart: "no"

  foxglove:
    image: ${FOXGLOVE_ROS_IMAGE:-ros:humble-ros-base}
    container_name: aerial-foxglove-8865
    network_mode: host
    environment:
      <<: *ros-env
      FOXGLOVE_PORT: "${FOXGLOVE_PORT:-8865}"
      DEBIAN_FRONTEND: noninteractive
    volumes:
      - .:/workspace/aerial_ws:ro
    working_dir: /workspace/aerial_ws
    entrypoint: ["/bin/bash", "-lc"]
    command: /workspace/aerial_ws/scripts/run_foxglove_bridge.sh
    restart: "no"

volumes:
  isaac_sim_cache:
  isaac_sim_data:
  isaac_sim_logs:
